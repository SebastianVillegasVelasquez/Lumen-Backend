# .pre-commit-config.yaml
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.10
    hooks:
      # Lint and auto-fix
      - id: ruff
        args: [--fix]

      # Format code
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests
          - sqlalchemy
          - asyncpg
        args:
          - --ignore-missing-imports